# bootstrapping docs
printf "gdoc_MANS =\ngdoc_TEXINFOS =\n" > doc/Makefile.gdoc

# gnulib library name
source_base=gl
tests_base=gl/tests
m4_base=gl/m4
gnulib_name=libgnu
checkout_only_file=.gitignore

gnulib_modules="
  autobuild
  csharpcomp-script
  csharpexec-script
  error
  fdl-1.3
  getline
  getopt-gnu
  git-version-gen
  gitlog-to-changelog
  lib-msvc-compat
  lib-symbol-versions
  lib-symbol-visibility
  manywarnings
  pmccabe2html
  progname
  readme-release
  update-copyright
  useless-if-before-free
  valgrind-tests
  version-etc
"

lib_modules="
  gettext-h
  langinfo
  stdint
  striconv
  strverscmp
  unistr/u8-check
"

# Build prerequisites
buildreq="\
autoconf   2.64
automake   1.13
git        1.4.4
perl       5.5
make       -
gperf      -
gengetopt  -
"

GTKDOCIZE=$(which gtkdocize 2>/dev/null)
if test $? -ne 0; then
  echo "No gtk-doc support found. You can't build the docs."
  # rm because gtk-doc.make might be a link to a protected file
  rm -f gtk-doc.make 2>/dev/null
  echo "EXTRA_DIST =" >gtk-doc.make
  echo "CLEANFILES =" >>gtk-doc.make
  GTKDOCIZE=""
else
  mkdir -p gl/m4
  $GTKDOCIZE
fi

bootstrap_post_import_hook ()
{
  # No test modules are used but 'valgrind-tests' make gnulib-tool
  # believe we need this.
  rm -rf gl/tests

  ${GNULIB_SRCDIR}/gnulib-tool --without-tests --libtool --macro-prefix=lgl --lgpl=2 --dir=. --lib=libgnu --source-base=lib/gl --m4-base=gl/m4 --import ${lib_modules}

  # Automake requires that ChangeLog exist.
  touch ChangeLog || return 1
}
